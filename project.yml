name: TheCaddie

options:
  minimumXcodeGenVersion: 2.44.1
  deploymentTarget:
    iOS: "18.0"

settings:
  base:
    DEVELOPMENT_TEAM: XT9G73WJRY
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    SDKROOT: iphoneos
    SWIFT_VERSION: 5.0

packages:
  TheCaddiePackage:
    path: .

targets:
  TrueCaddie:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources/TheCaddieDomain
      - path: ios/TheCaddie
        excludes:
          - README.md
    entitlements:
      path: ios/TheCaddie/TrueCaddie.entitlements
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: TrueCaddieAppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 3
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: TrueCaddie
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.sports
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: TrueCaddie uses your location during a round to understand shot context.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: TrueCaddie may use the microphone for future voice caddie features.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
        MARKETING_VERSION: 1.0
        PRODUCT_BUNDLE_IDENTIFIER: com.truecaddie.ios
        PRODUCT_NAME: TrueCaddie
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        TARGETED_DEVICE_FAMILY: "1,2"

schemes:
  TrueCaddie:
    build:
      targets:
        TrueCaddie: all
    test:
      targets:
        - package: TheCaddiePackage/TheCaddieDomainTests
